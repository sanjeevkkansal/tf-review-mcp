name: Release mcp-adversarial

on:
  push:
    tags:
      - "mcp-adversarial-v*"

permissions: {}

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify tag matches package version
        working-directory: packages/mcp-adversarial
        run: |
          tag_version="${GITHUB_REF_NAME#mcp-adversarial-v}"
          pkg_version=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version $tag_version does not match pyproject version $pkg_version" >&2
            exit 1
          fi

      - name: Build distributions
        working-directory: packages/mcp-adversarial
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/mcp-adversarial/dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-adversarial/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
