[project]
name = "mcp-adversarial"
version = "0.0.0"
description = "Adversarial input harness for MCP servers (placeholder; real release in v0.1.0)."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Sanjeev Kumar" }]
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_adversarial"]
